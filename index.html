<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeRunners - Café da Manhã</title>
    <!-- Tailwind CSS para estilização moderna e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ea580c 0%, #9a3412 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }
        
        /* Efeito de vidro (Glassmorphism) para o card da lista */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* Animação suave para a lista */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased text-gray-800">

    <main class="w-full max-w-md w-full mt-4 mb-8">
        <!-- Card Principal -->
        <div class="glass-card rounded-3xl overflow-hidden fade-in">
            
            <!-- Cabeçalho Visual -->
            <div class="bg-gradient-to-r from-orange-500 to-orange-600 p-6 text-center relative overflow-hidden">
                <!-- Ícone decorativo de fundo -->
                <svg class="absolute -right-4 -top-4 w-24 h-24 text-white opacity-10" fill="currentColor" viewBox="0 0 24 24"><path d="M13.4 2.096a10.08 10.08 0 0 0-8.937 3.331A10.054 10.054 0 0 0 2.096 13.4c.53 3.894 3.458 7.207 7.285 8.246a9.982 9.982 0 0 0 2.618.354l.142-.001a3.001 3.001 0 0 0 2.516-1.426 2.989 2.989 0 0 0 .153-2.879l-.199-.416a1.919 1.919 0 0 1 .094-1.912 2.004 2.004 0 0 1 2.576-.755l.412.197c.412.198.85.299 1.301.299A3.022 3.022 0 0 0 22 12.14a9.935 9.935 0 0 0-.353-2.618c-1.04-3.827-4.353-6.755-8.247-7.426z"/></svg>
                
                <div class="relative z-10">
                    <h1 class="text-3xl font-extrabold text-white tracking-tight drop-shadow-md">LeRunners</h1>
                    <p class="text-orange-100 font-medium mt-1 text-sm uppercase tracking-wider">Lista do Café da Manhã ☕</p>
                </div>
            </div>

            <!-- Área da Lista Atual -->
            <div class="p-6 bg-orange-50/50 border-b border-orange-100">
                <h2 class="text-sm font-bold text-orange-800 mb-3 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    Já confirmados na lista:
                </h2>
                
                <!-- Container onde a lista será renderizada dinamicamente -->
                <ul id="listaConfirmados" class="space-y-2 text-sm text-gray-700">
                    <!-- Itens inseridos via JavaScript -->
                </ul>
            </div>

            <!-- Formulário do Usuário -->
            <div class="p-6 space-y-4">
                <div class="relative flex items-center py-1">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-400 text-xs uppercase font-bold tracking-wider">Adicione seu Item</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <!-- Campo Nome -->
                <div>
                    <label for="userName" class="block text-sm font-bold text-gray-700 mb-1">Seu Nome</label>
                    <input type="text" id="userName" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 focus:bg-white outline-none transition-all text-sm text-gray-800 font-medium" placeholder="Ex: Enzo">
                </div>

                <!-- Campo Item -->
                <div>
                    <label for="item" class="block text-sm font-bold text-gray-700 mb-1">O que vai levar?</label>
                    <input type="text" id="item" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 focus:bg-white outline-none transition-all text-sm text-gray-800 font-medium" placeholder="Ex: Suco, Pão de Queijo...">
                </div>

                <!-- Botão de Ação -->
                <button onclick="processAndSend()" class="w-full mt-2 bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-4 rounded-xl transition-all duration-200 shadow-lg shadow-green-500/30 flex items-center justify-center gap-3 active:transform active:scale-95">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
                    </svg>
                    Confirmar e Enviar no WhatsApp
                </button>
            </div>
        </div>
        
        <!-- Alerta de Erro -->
        <div id="errorMsg" class="hidden mt-4 bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded shadow-md text-sm font-medium">
            Por favor, preencha seu nome e o que vai levar!
        </div>
    </main>

    <!-- Lógica de Estado no Link (Magic Link Logic) -->
    <script>
        // ESTADO INICIAL PADRÃO (Caso não haja nada na URL)
        // Usamos arrays curtos [Nome, Item] para economizar espaço na URL
        const defaultData = [
            ["Leandro", "Café 🍵, Água, Banana, Melão, Pão de forma"]
        ];

        let currentList = [];

        // Funções para codificar e decodificar os dados na URL de forma segura com acentos
        const encodeData = (data) => btoa(encodeURIComponent(JSON.stringify(data)));
        const decodeData = (str) => JSON.parse(decodeURIComponent(atob(str)));

        // Função que roda ao carregar a página
        function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('d');

            if (dataParam) {
                try {
                    currentList = decodeData(dataParam);
                } catch (e) {
                    console.error("Erro ao decodificar dados da URL, usando padrão.", e);
                    currentList = [...defaultData];
                }
            } else {
                currentList = [...defaultData];
            }

            renderList();
        }

        // Renderiza a lista visualmente na tela
        function renderList() {
            const ul = document.getElementById('listaConfirmados');
            ul.innerHTML = ''; // Limpa atual

            currentList.forEach(entry => {
                const nome = entry[0];
                const item = entry[1];
                
                const li = document.createElement('li');
                li.className = "flex items-start gap-2 bg-white p-3 rounded-lg border border-orange-100 shadow-sm";
                li.innerHTML = `
                    <svg class="w-5 h-5 text-green-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    <div>
                        <span class="font-bold text-gray-800">${nome}</span>
                        <span class="text-gray-600 block sm:inline sm:ml-1">- ${item}</span>
                    </div>
                `;
                ul.appendChild(li);
            });
        }

        // Função executada ao clicar no botão Enviar
        function processAndSend() {
            const userNameInput = document.getElementById('userName');
            const itemInput = document.getElementById('item');
            const errorMsg = document.getElementById('errorMsg');
            
            const userName = userNameInput.value.trim();
            const item = itemInput.value.trim();

            if (!userName || !item) {
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
                return;
            }

            // 1. Adiciona o novo usuário na lista em memória
            currentList.push([userName, item]);

            // 2. Gera a nova String Base64 com a lista atualizada
            const newDataEncoded = encodeData(currentList);

            // 3. Monta o NOVO link mágico (pega a URL atual, remove os parâmetros velhos e adiciona o novo)
            const baseUrl = window.location.origin + window.location.pathname;
            const magicLink = `${baseUrl}?d=${newDataEncoded}`;

            // 4. Monta o texto lindo para o WhatsApp
            let waText = "🏃‍♂️ *LeRunners - Café da Manhã* 🍵\n";
            waText += "-----------------------------------\n";
            currentList.forEach(entry => {
                waText += `✅ *${entry[0]}* - ${entry[1]}\n`;
            });
            waText += "-----------------------------------\n\n";
            waText += "👇 *Clique no link abaixo para adicionar o seu na lista:* 👇\n";
            waText += magicLink;

            // 5. Atualiza a tela localmente (opcional, dá um feedback visual rápido)
            renderList();
            userNameInput.value = '';
            itemInput.value = '';

            // 6. Abre o WhatsApp com a mensagem pronta
            const waUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(waText)}`;
            window.open(waUrl, '_blank');
        }

        // Inicializa o aplicativo
        window.onload = initApp;
    </script>
</body>
</html>
